version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - gheverhan-network

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - gheverhan-network
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: gheverhan
      DB_USERNAME: gheverhan
      DB_PASSWORD: password
      REDIS_HOST: redis

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - nginx
    networks:
      - gheverhan-network
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gheverhan
      MYSQL_USER: gheverhan
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - gheverhan-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - gheverhan-network

volumes:
  mysql-data:
  redis-data:

networks:
  gheverhan-network:
    driver: bridge
